[Service]
# Next.js `next-server` ignores SIGTERM (the default KillSignal) and lingers
# until SIGKILL, so every stop/restart waits the full TimeoutStopSec (90s) —
# which aborts web/frontend/deploy.sh mid-swap on a "Job ... canceled". SIGINT
# is the graceful-shutdown path next-server actually handles; bound the stop at
# 10s as a safety net so a misbehaving process never stalls a deploy again.
KillSignal=SIGINT
TimeoutStopSec=10s
