    default: true
  - id: claude-sonnet-4-6
    agent: claude
  - id: claude-haiku-4-5
    agent: claude
  - id: deepseek-v4-flash
    agent: pi
    provider: deepseek
  - id: deepseek-v4-pro
    agent: pi
    provider: deepseek
    default: true
  - id: gpt-5.5
    agent: pi
    provider: openai-codex
    # gpt-5.5 dropped 'minimal' (use 'none') and added 'xhigh'. The dispatch
    # gate rejects an unsupported reasoning_effort before dispatch instead of
    # letting the provider fail the run. Models without an `efforts:` list are
    # not effort-validated (back-compat).
    efforts: [none, low, medium, high, xhigh]
  - id: claude-haiku-4-5-20251001
    agent: pi
    provider: cliproxy
  - id: claude-opus-4-8
