models:
  - id: claude-opus-4-8
    agent: claude
    label: Opus 4.8
    default: true
  - id: claude-sonnet-4-6
    agent: claude
  - id: deepseek-v4-flash
    agent: pi
    provider: deepseek
  - id: deepseek-v4-pro
    agent: pi
    provider: deepseek
  - id: gpt-5.5
    agent: pi
    provider: openai-codex
    # gpt-5.5 dropped 'minimal' (use 'none') and added 'xhigh'. The dispatch
    # gate rejects an unsupported reasoning_effort before dispatch instead of
    # letting the provider fail the run. Models without an `efforts:` list are
    # not effort-validated (back-compat).
    efforts: [none, low, medium, high, xhigh]
  - id: gpt-5.6-terra
    agent: pi
    provider: openai-codex
  - id: gpt-5.6-sol
    agent: pi
    provider: openai-codex
  - id: claude-opus-4-8
    agent: pi
    provider: cliproxy
  - id: claude-sonnet-4-6
    agent: pi
    provider: cliproxy
  - id: glm-5.2
    agent: pi
    provider: zai
  - id: Duo
    agent: pi
    provider: pi-duo
    default: true
