- round: 1
  findings:
    critical:
    - "[CRITICAL] No `BEGIN IMMEDIATE` transaction precedent exists in the codebase \u2014 the observe endpoint's concurrency guarantees depend on it\n  Detail: The plan (step 3.1) specifies the `POST /api/bindings/{name}/incidents/observe` endpoint must use `BEGIN IMMEDIATE` SQLite transactions to serialize concurrent Temporal workflows and prevent duplicate issues on uniqueness races. Every existing endpoint in `web/api/main.py` (create_binding_issue, patch_issue, reply, comment) relies on SQLite's default deferred-mode transactions (`connection.commit()` without explicit `BEGIN`). Deferred-mode does NOT serialize writes \u2014 two concurrent observations of the same Incident identity would both SELECT (finding nothing) and both attempt INSERT, with only one succeeding (the other hits `IntegrityError` on `ix_issue_external_id`). The plan's own design acknowledges this (\"re-read and decide in the same serialized path\") but the implementation must introduce a wholly new transaction pattern\
      \ (manual `connection.execute(\"BEGIN IMMEDIATE\")` before the read-decide-write block) with no existing model to follow in the codebase.\n  Suggested fix: Before implementing, prototype the `BEGIN IMMEDIATE` pattern in a small standalone endpoint or in the test harness to validate the SQLite concurrency behavior. In the observe endpoint body: call `connection.execute(\"BEGIN IMMEDIATE\")` at the top, wrap the read+decide+write in try/except, catch `IntegrityError` for the race case, re-query in the same transaction, and commit/rollback explicitly. Update `_purge_archived_issues` and the new `prune_patrol_runs` to match the same explicit-transaction pattern if they touch `external_id` rows."
    - "[CRITICAL] `agent_session_id` column is missing from `_RUN_INSERT_COLUMNS` in `tracker_podium.py` \u2014 session rotation fails silently without it\n  Detail: Step 7.3 requires persisting the candidate's `agent_session_id` (the generation-scoped session UUID) on the Run row so the tailer and session-continuity checks can use it. The migration (step 2.1) adds `run.agent_session_id` to the schema, but `tracker_podium.py` `_RUN_INSERT_COLUMNS` (line 758) currently lists `agent_session_sha` only \u2014 no `agent_session_id`. `record_run`'s INSERT (line 477-481) iterates over `_RUN_INSERT_COLUMNS` to build the `VALUES` tuple. If `agent_session_id` is not in that tuple, the column is never populated. The scheduler's `start_run_record` (in `scheduler/run_records.py`, line 96-148) builds `run_payload` dict explicitly with `agent_session_sha` but no `agent_session_id`. Three places must be updated: schema, `_RUN_INSERT_COLUMNS`, and `start_run_record`.\n  Suggested fix: Add `agent_session_id`\
      \ to `_RUN_INSERT_COLUMNS` (at the end, after `agent_session_sha`). In `scheduler/run_records.py` `start_run_record`, add `\"agent_session_id\": getattr(candidate, \"agent_session_id\", \"\") or None` to the `run_payload` dict. In the migration schema and `SCHEMA_SQL`, place `agent_session_id TEXT` after `agent_session_sha`."
    - "[CRITICAL] `_SessionTailer._poll_running` will continue using issue-derived session IDs, breaking live tailing for rotated patrol sessions\n  Detail: Step 7.4 says to update the session tailer to use the active Run's persisted `agent_session_id` instead of `derive_session_id(issue_id)`. The current `_poll_running` query (line 249-255 of `main.py`) selects only `r.agent, r.id AS run_id` from the `run` table \u2014 it does NOT select `r.agent_session_id`. At line 295, it computes `session_id = derive_session_id(issue_id)` unconditionally. For a rotated patrol session (generation 1+), this would compute the wrong session file path and tail nothing (or tail a stale session). Live tailing would be broken for all patrol issues past Run 3.\n  Suggested fix: Update the `SELECT` to include `r.agent_session_id`. In the non-remote path, use `row[\"agent_session_id\"]` if non-null, falling back to `derive_session_id(issue_id)` for legacy rows. Update the query: `SELECT i.id, i.binding_name, r.agent,\
      \ r.id AS run_id, r.agent_session_id FROM issue i INNER JOIN run r ON r.id = i.latest_run_id WHERE i.latest_run_state = 'running'`."
    warning:
    - "[WARNING] Plan says to compute session generation as `dispatch_count // 3` BEFORE increment but `start_run_record` doesn't touch the issue row\n  Detail: Step 7.2 says to read `patrol_dispatch_count`, compute generation `count // 3` before Run creation, then use that id throughout resume eligibility. Step 7.3 says to \"atomically increment the patrol dispatch count\" during Run creation. Currently `start_run_record` (in `scheduler/run_records.py`) creates the Run row in the tracker but does NOT update the issue's `patrol_dispatch_count`. The increment must either happen inside `tracker_podium.record_run` (which would require the adapter method to know the count, adding coupling) or in a separate UPDATE call between `start_run_record` and dispatch. The scheduler currently reads `fresh_issue` before Run creation \u2014 the count would be stale if read at that point. The dispatch count read must happen inside the same transaction that creates the Run, or be passed through a pre-increment-then-create\
      \ pattern.\n  Suggested fix: Add `patrol_dispatch_count` increment to `tracker_podium.record_run` as a post-INSERT step: after inserting the Run, execute `UPDATE issue SET patrol_dispatch_count = patrol_dispatch_count + 1, current_severity = ?, last_dispatched_severity = ? WHERE id = ? AND origin = 'patrol'`. But `record_run` receives a flat dict, not structured candidate data. Either extend the `run_row` dict to carry optional patrol metadata, or add a separate adapter method (`atomically_increment_dispatch_count`) called from the scheduler. The former is simpler and avoids a second DB round-trip."
    - "[WARNING] `_purge_archived_issues` has no `origin` filter \u2014 currently hard-deletes ALL archived issues including patrol\n  Detail: The function at line 2422 queries `WHERE state = 'archived' AND updated_at < ?` with no filter on `origin`. This would destroy the archived patrol lineage that the plan says must be preserved indefinitely (step 4.2: \"Exempt archived patrol issues from the general 14-day hard purge\"). If not fixed, archived patrol history would be silently deleted within 14 days, violating operator story 21 (\"archived history preserved\").\n  Suggested fix: Add `AND origin != 'patrol'` to the eligible issues WHERE clause. This preserves both archived patrol metadata and the non-patrol purge contract unchanged."
    - "[WARNING] The new observe endpoint must co-exist with the existing `create_binding_issue` + `patch_issue` patrol paths until all callers are migrated\n  Detail: There is a deployment ordering race: the Symphony migration (which adds columns with safe defaults) must deploy BEFORE the homelab worker starts calling the new `/incidents/observe` endpoint. But the existing homelab worker simultaneously calls `create_binding_issue` (which sets `external_id` in the old format via `IssuePayload.external_id`) and `patch_issue`/`comment_on_issue` (which append to `comments_md` and flip state). While the homelab rollout is in progress, both the old and new paths could touch the same issue row. The plan (step 9.3) addresses deployment ordering at a service level but doesn't detail the row-level conflict: if the old `create_binding_issue` sets `external_id='homelab-...'` and the new observe endpoint then sets `external_id` from family+resource, the old `external_id` is lost. Conversely, if the\
      \ old path creates a Todo issue and the new path silently-updates it, the old path's subsequent `record_failure` (which PATCHes state to todo and appends a comment) would disrupt the silent update.\n  Suggested fix: In the transition period between Symphony API deploy and homelab worker deploy, the existing create/patch endpoints MUST NOT touch patrol-origin issues that have already been observed through the new endpoint. Or the homelab worker must be completely stopped during the Symphony deploy window. Add a deprecation gate to `create_binding_issue` that returns 409/400 for patrol-origin issues once the migration has landed, or co-opt `origin='patrol'` + presence of `incident_family` as a signal that the new path owns the row."
    - "[WARNING] `patrol_plane.record_failure` must route between legacy Plane and new Podium observe paths, but the routing condition is ambiguous\n  Detail: Step 5.5 says to \"use the Podium observation capability for fail/warning/pass results, including configured recovery confirmation, while retaining the existing exact-id `record_failure`/`record_pass` behavior for the dormant Plane adapter.\" Currently `patrol_plane.py`'s `record_failure` (line 344) always calls `adapter.find_by_external_id` and then either creates or updates via the `TicketWriter` seam. The homelab architecture decouples backends behind `TicketWriter` (PlaneAdapter vs PodiumAdapter), but the new observe endpoint is a NEW API contract (`POST /incidents/observe`), not a drop-in replacement for `TicketWriter.upsert`. The `TicketWriter` seam doesn't have an \"incident observe\" method. The plan implies `patrol_plane.py` must either (a) detect whether it's running with a Podium adapter and call a new `observe_incident`\
      \ method, or (b) call the HTTP endpoint directly. Both approaches break the existing `TicketWriter` abstraction.\n  Suggested fix: Add an `observe_incident` method to the `TicketWriter` protocol and implement it in `PodiumAdapter` (calling `POST /incidents/observe`). Implement a no-op/passthrough in `PlaneAdapter` that falls back to existing `record_failure`/`record_pass`. This keeps the abstraction intact while enabling the new path."
    - "[WARNING] `patrol_workflow.py` iterates results one-by-one but coalescing must group before activity calls \u2014 changes the workflow's fundamental structure\n  Detail: `PatrolWorkflow.run` (line 183-210) calls `run_patrol_checks` activity, gets a `CheckResultsBatch`, then iterates `for result in results` calling `record_patrol_check_result` for EACH result. Step 5.3 says to \"coalesce normalized native patrol results before invoking ticket activities\" \u2014 meaning N check results for the same Incident produce 1 coalesced result and 1 ticket activity call. This changes the loop structure from 1:1 (result\u2192activity) to N:1 (N results \u2192 coalescer \u2192 1 canonical finding \u2192 1 activity). The health summary totals must still come from the ORIGINAL results, but the activity outcomes come from the coalesced results. This is a non-trivial refactor of the workflow body.\n  Suggested fix: After `run_patrol_checks`, insert a coalescing step: `coalesced = incident_coalescer.group(batch.results)`.\
      \ Compute `summary = PatrolRunSummary.from_results(params.domain, batch.results)` from original results. Then iterate `for canonical in coalesced` instead of `for result in results`. Pass each coalesced canonical `CheckResult` (with sibling evidence attached) to the ticket activity. Wire the coalescer's action counters into the workflow result."
    note:
    - "[NOTE] The plan's generation 0 condition (`dispatch_count // 3` before increment) is correct for greenfield but backfill must count only terminal Runs\n  Detail: Migration 0021 backfills `patrol_dispatch_count` by counting existing Run rows (step 2.2: \"Backfill patrol_dispatch_count from all existing Run rows before any pruning\"). If a patrol issue has a `queued` Run that hasn't started, that Run counts toward the dispatch count, inflating it. The next dispatch would see `count // 3` one too high. But for existing oversized issues (e.g., 150 completed Runs + 1 queued Run), the off-by-one is negligible. For issues with only a queued Run (never dispatched an agent), count=1 means the first real dispatch gets generation 0 (`0//3=0`), which is correct. The edge case is only noticed when queued Runs exist from after the schema migration but before the homelab worker is updated \u2014 and those old queued Runs would be reaped by `reconcile_orphaned_runs` anyway.\n  Suggested fix: No fix\
      \ needed \u2014 the quirk is self-correcting because orphaned queued Runs are reaped at startup. Document the race in the migration commentary: the backfill query should count `WHERE state IN ('succeeded', 'failed', 'running') \u222A started_at IS NOT NULL` to exclude pre-start queued Runs, or accept the minor inflation."
    - "[NOTE] `host-alerts.yml` uses `labels.check_id` but the plan adds `incident_family`/`incident_resource` \u2014 new Prometheus label names must not collide with existing dimensions\n  Detail: The plan (step 5.1) says to add `incident_family` and `incident_resource` labels to the disk rules. Currently the alert rules have `labels: {severity, domain, check_id, scope}`. The new labels `incident_family: disk-usage` and `incident_resource: \"{{ $labels.instance }}/{{ $labels.mountpoint }}\"` are valid Prometheus label values and won't collide. The `alert_forwarder.py` currently reads `labels.severity`, `labels.domain`, `labels.check_id`, `labels.scope` \u2014 it must be updated to also read `labels.incident_family` and `labels.incident_resource` (step 5.2). For unannotated rules, the fallback is the existing `check_id` + series fingerprint behavior, which the forwarder already handles.\n  Suggested fix: In `alert_forwarder.py`, add `incident_family = alert.labels.get(\"incident_family\"\
      )` and `incident_resource = alert.labels.get(\"incident_resource\")` when constructing `CheckResult`. Pass them through to the coalescer. Rules without these labels get `None` and fall back to exact-per-series identity."
