  revision_summary: Specified and test-scoped the new BEGIN IMMEDIATE pattern; wired scheduler/run_records.py, _RUN_INSERT_COLUMNS, and SessionTailer session-id persistence; made TicketWriter.observe_incident explicit; detailed N-to-one workflow coalescing, purge exemption, dispatch-count transaction, and no-overlap rollout.
- round: 2
  findings:
    critical: []
    warning:
    - "[WARNING] Transition window external_id mismatch creates duplicate patrol issues for existing incidents\n  Detail: Step 2.2 backfills `incident_family`/`incident_resource` on existing patrol rows but preserves their old `external_id` values (e.g. `\"homelab-HostDiskUsageHigh\"`). Step 3.1 computes the observation endpoint's lookup key server-side as `f\"{family}:{resource}\"` (e.g. `\"disk-usage:host:/mnt\"`). The drain-then-deploy sequence in step 9.3 prevents concurrent old-path writes but does not prevent the new path's first observation for each existing incident from creating a *second* issue \u2014 the lookup by the new computed external_id won't find the old row. The old and new issues then coexist until the old one is manually archived. The revision acknowledges the migration doesn't rewrite external_ids (\"preserve existing `external_id`\"), but does not document this one-time duplication as expected transition behavior. Operators will see duplicate issues for every existing\
      \ patrol incident after the first new-format observation.\n  Suggested fix: Either (a) during migration backfill (step 2.2), rewrite `external_id` to the new `family:resource` format for rows where both family and resource can be recovered, so the observation endpoint finds them; or (b) explicitly document in step 9.3 that one duplicate issue per existing incident is expected, will self-clear when the old issue is archived, and note the cleanup step operators should follow.\n\n---\n\n## New Findings (from revision-only scan)"
    - "[WARNING] `record_run` patrol dispatch-count UPDATE lacks an `origin='patrol'` guard in the plan specification\n  Detail: Step 7.3 says record_run should \"increment the owning patrol issue's dispatch count\" in the same transaction. The plan doesn't explicitly specify adding `AND origin = 'patrol'` (or `WHERE origin = 'patrol'`) to this UPDATE. The scheduler's dispatch loop *should* only trigger this path for patrol issues (since step 7.2 reads `patrol_dispatch_count` only for patrol-origin candidates), but defense-in-depth is missing. If a non-patrol Run creation ever reaches this code path (e.g., future refactor, a bug introducing a wrong discriminator), a non-patrol issue would silently get its `patrol_dispatch_count` incremented, corrupting future patrol eligibility checks.\n  Suggested fix: Specify the UPDATE as `UPDATE issue SET patrol_dispatch_count = patrol_dispatch_count + 1, ... WHERE id = ? AND origin = 'patrol'`. The 0-rows-affected case should not error (it means a non-patrol\
      \ issue, which is correct)."
    note:
    - "[NOTE] `agent_session_id` will be in `_RUN_UPDATE_COLUMNS`, allowing post-creation mutation of an immutable field\n  Detail: `_RUN_UPDATE_COLUMNS` (line 760) is derived as `tuple(key for key in _RUN_INSERT_COLUMNS if key != \"issue_id\")`. When `agent_session_id` is added to `_RUN_INSERT_COLUMNS` (step 7.3), it will also appear in `_RUN_UPDATE_COLUMNS`, meaning `update_run` will accept `agent_session_id` as a valid update column. The session ID for a Run should be immutable after creation \u2014 it represents the actual session file used, and changing it would break session-tailing and audit consistency. No planned code path would mutate it, but the schema permits it.\n  Suggested fix: Remove `agent_session_id` from `_RUN_UPDATE_COLUMNS` explicitly (e.g., filter it alongside `issue_id`: `if key not in (\"issue_id\", \"agent_session_id\")`) or add a brief comment noting it's intentionally excluded from updates."
    - "[NOTE] Backfill timing gap: migration counts orphaned queued runs before startup reconciliation terminalizes them\n  Detail: Step 2.2 counts \"all persisted existing Run rows\" including orphaned queued runs, and step 9.3 restarts Symphony *after* migration. Startup reconciliation (step 9.3 \"Restart symphony-host.service for scheduler/retention code\") terminalizes orphaned queued rows. Between migration and restart, `patrol_dispatch_count` is inflated for issues with orphaned queued runs. Since the scheduler isn't dispatching during this window (it restarts in step 9.3, which also runs reconciliation), the inflated count is never observed by dispatch logic. Self-correcting and operationally harmless.\n  Suggested fix: None needed \u2014 this is a documentation note. The plan could optionally mention the gap in step 2.2's commentary, but it's already implied by \"startup reconciliation will terminalize orphaned queued rows.\""
