# Symphony project bindings.
#
# Each binding maps one Plane project (in the `homelab` workspace) to one
# git repo plus its dispatch config. Loading bindings.yml flips Symphony
# out of single-project env mode (PLANE_PROJECT_ID / HOMELAB_REPO_PATH no
# longer required). See plane/symphony/CONTEXT.md and ADR-0004.
#
# Concurrency: each binding gets its own dispatcher loop and semaphore of
# size SYMPHONY_RUN_CAP. Host-wide live Runs = run_cap x len(bindings).

bindings:
  - name: homelab
    plane_project_id: cff68c17-bff6-452f-89b3-9b570613cfaa
    repo_path: /home/james/homelab
    base_branch: main
    default_agent: pi
    # Preserves current runtime behaviour (SYMPHONY_APPROVAL_GATE_ENABLED
    # is unset on symphony-host.service → off). CONTEXT.md says "homelab
    # opts in"; flip to true in a separate commit if desired.
    approval:
      enabled: false
    landing:
      mode: local
    tracker_contract:
      workspace_slug: homelab
      project_slug: automations
      project_id: cff68c17-bff6-452f-89b3-9b570613cfaa
      state_roles:
